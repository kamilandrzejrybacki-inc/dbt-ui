name: build
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            dockerfile: docker/Dockerfile.backend
          - name: frontend
            dockerfile: docker/Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/kamilandrzejrybacki-inc/dbt-ui-${{ matrix.name }}:main
            ghcr.io/kamilandrzejrybacki-inc/dbt-ui-${{ matrix.name }}:${{ github.sha }}
